name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: node16-win-x64
            binary: c.exe
            zip_name: c-win-x64.zip
          - os: ubuntu-latest
            target: node16-linux-x64
            binary: c
            zip_name: c-linux-x64.zip
          - os: macos-latest
            target: node16-macos-x64
            binary: c
            zip_name: c-macos-x64.zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 16
        uses: actions/setup-node@v4
        with:
          node-version: '16'

      - name: Install dependencies
        run: npm ci

      - name: Install pkg globally
        run: npm install -g pkg

      - name: Build with pkg
        run: pkg index.js --target ${{ matrix.target }} --output ${{ matrix.binary }}

      - name: Package binary + lib folder into zip
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            7z a ${{ matrix.zip_name }} ${{ matrix.binary }} lib/
          else
            zip -r ${{ matrix.zip_name }} ${{ matrix.binary }} lib/
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.zip_name }}
          path: ${{ matrix.zip_name }}

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: |
            Automated build for ${{ github.ref_name }}
          files: release-assets/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}